<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <match target="font">
        <edit mode="assign" name="rgba"><const>none</const></edit>
        <edit mode="assign" name="hinting"><bool>true</bool></edit>
        <edit mode="assign" name="hintstyle"><const>hintfull</const></edit>
        <edit mode="assign" name="antialiasing"><bool>true</bool></edit>
    </match>
    <alias><family>Segoe UI</family><prefer><family>Liberation Sans</family></prefer></alias>
    <alias><family>Tahoma</family><prefer><family>Liberation Sans</family></prefer></alias>
    <alias><family>Arial</family><prefer><family>Liberation Sans</family></prefer></alias>
    <alias><family>Times New Roman</family><prefer><family>Liberation Serif</family></prefer></alias>
    <alias><family>Courier New</family><prefer><family>Liberation Mono</family></prefer></alias>
</fontconfig>

services:
  clean_browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean_browser
    image: clean_browser:latest
    network_mode: "host"
    ipc: host
    shm_size: "2gb"
    user: "root"
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    environment:
      - DISPLAY=:0
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/runtime
      - HOME=/tmp
      - QT_X11_NO_MITSHM=1
      - QT_QUICK_BACKEND=software
      - 'QT_WEBENGINE_CHROMIUM_FLAGS=--disable-gpu --disable-gpu-compositing --disable-gpu-rasterization --use-gl=swiftshader --disable-dev-shm-usage --disable-blink-features=AutomationControlled --lang=en-US'
    volumes:
      - //wsl.localhost/wslg/tmp/.X11-unix:/tmp/.X11-unix:ro
      - //wsl.localhost/wslg/mnt/wslg:/mnt/wslg:ro
      - //wsl.localhost/wslg/runtime-dir:/runtime:ro
      - browser_250_windows_profile:/tmp/.config/clean_browser
    restart: unless-stopped

volumes:
  browser_250_windows_profile:

services:
  clean_browser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean_browser
    image: clean_browser:latest
    network_mode: "host"
    ipc: host
    shm_size: "2gb"
    user: "1000:1000"
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    environment:
      - DISPLAY=:0
      - WAYLAND_DISPLAY=wayland-0
      - XDG_RUNTIME_DIR=/runtime
      - HOME=/tmp
      - QT_X11_NO_MITSHM=1
      - QT_QUICK_BACKEND=software
      - 'QT_WEBENGINE_CHROMIUM_FLAGS=--disable-gpu --disable-gpu-compositing --disable-gpu-rasterization --use-gl=swiftshader --disable-dev-shm-usage --disable-blink-features=AutomationControlled --lang=en-US'
    volumes:
      - x11_socket:/tmp/.X11-unix:ro
      - wslg_dir:/mnt/wslg:ro
      - runtime_dir:/runtime:ro
      - browser_250_windows_profile:/tmp/.config/clean_browser
    restart: unless-stopped

volumes:
  browser_250_windows_profile:
  x11_socket:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /tmp/.X11-unix
  wslg_dir:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/wslg
  runtime_dir:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/wslg/runtime-dir
